syntax = "proto3";
package tendermint_celestia_mods.privval;

// SignRawBytesRequest is used by celestia-core's PrivValidator to sign
// arbitrary bytes with domain separation. This message is not present in
// upstream CometBFT — it is a celestia-core addition.
message SignRawBytesRequest {
  string chain_id  = 1;
  bytes  raw_bytes = 2;
  string unique_id = 3;
}
